<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#F5F1E8"/>
  <rect x="38" y="38" width="1124" height="554" rx="28" fill="#FFFDF8" stroke="#D7D0C4" stroke-width="4"/>
  <rect x="78" y="86" width="320" height="34" rx="17" fill="#E6F0F2"/>
  <text x="98" y="109" fill="#1E5563" font-family="Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">SEWERCLARITY</text>
  <text x="78" y="206" fill="#1F2A30" font-family="Georgia, serif" font-size="58" font-weight="700">
    <tspan x="78" dy="0">Sewer risk guidance</tspan>
    <tspan x="78" dy="74">that stays calm,</tspan>
    <tspan x="78" dy="74">credible, and useful.</tspan>
  </text>
  <text x="82" y="452" fill="#5F6B72" font-family="Arial, sans-serif" font-size="28">
    <tspan x="82" dy="0">Buyer-first next-step estimator for buyers, sellers, and owners.</tspan>
    <tspan x="82" dy="42">Ranges, not fake certainty. Inspection-first or quote-ready, with reasons.</tspan>
  </text>
  <rect x="760" y="132" width="316" height="166" rx="24" fill="#133B44"/>
  <text x="790" y="176" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="1.5">SAMPLE RESULT</text>
  <text x="790" y="220" fill="#FFFFFF" font-family="Georgia, serif" font-size="30" font-weight="700">Inspection-first</text>
  <text x="790" y="258" fill="#D7E5E8" font-family="Arial, sans-serif" font-size="22">Old house + no scope yet</text>
  <text x="790" y="288" fill="#D7E5E8" font-family="Arial, sans-serif" font-size="22">means get footage first</text>
  <rect x="760" y="336" width="316" height="166" rx="24" fill="#ECE6DA" stroke="#D7D0C4" stroke-width="2"/>
  <text x="790" y="380" fill="#1E5563" font-family="Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="1.5">WHY USERS TRUST IT</text>
  <text x="790" y="424" fill="#1F2A30" font-family="Arial, sans-serif" font-size="22">Directional, not diagnostic</text>
  <text x="790" y="456" fill="#1F2A30" font-family="Arial, sans-serif" font-size="22">Explains what changed the call</text>
  <text x="790" y="488" fill="#1F2A30" font-family="Arial, sans-serif" font-size="22">Shows uncertainty openly</text>
</svg>
