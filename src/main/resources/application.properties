spring.application.name=sewerclarity
spring.thymeleaf.cache=false
server.error.whitelabel.enabled=false
server.forward-headers-strategy=framework

app.storage.root=${APP_STORAGE_ROOT:storage}
app.review-date=2026-03-17
app.contact-email=${APP_CONTACT_EMAIL:contact@sewerclarity.com}
app.ga4.measurement-id=${APP_GA4_MEASUREMENT_ID:G-V2CM3MD07G}
app.base-url=${APP_BASE_URL:https://sewerclarity.com}
app.ops.report.enabled=${APP_OPS_REPORT_ENABLED:false}
app.ops.report.token=${APP_OPS_REPORT_TOKEN:}
app.census.geocoder.enabled=${APP_CENSUS_GEOCODER_ENABLED:true}
app.census.geocoder.base-url=${APP_CENSUS_GEOCODER_BASE_URL:https://geocoding.geo.census.gov/geocoder}
app.census.geocoder.benchmark=${APP_CENSUS_GEOCODER_BENCHMARK:Public_AR_Current}
app.census.geocoder.vintage=${APP_CENSUS_GEOCODER_VINTAGE:Current_Current}

