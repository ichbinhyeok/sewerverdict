name: Build and Deploy to OCI ARM64

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: shinhyeok22/sewerclarity
  DEPLOY_DIR: ~/deploy/sewerclarity

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            shinhyeok22/sewerclarity:latest
            shinhyeok22/sewerclarity:${{ github.sha }}

      - name: Deploy on OCI
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_KEY }}
          port: ${{ secrets.OCI_PORT || 22 }}
          script_stop: true
          script: |
            set -eu
            DEPLOY_DIR="$HOME/deploy/sewerclarity"
            mkdir -p "$DEPLOY_DIR/storage"
            cd "$DEPLOY_DIR"

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            cat <<'EOF' > docker-compose.yml
            services:
              sewerclarity:
                image: shinhyeok22/sewerclarity:latest
                container_name: sewerclarity
                restart: unless-stopped
                ports:
                  - "8091:8080"
                environment:
                  APP_STORAGE_ROOT: /app/storage
                  APP_CONTACT_EMAIL: contact@sewerclarity.com
                  APP_GA4_MEASUREMENT_ID: G-V2CM3MD07G
                  JAVA_OPTS: -XX:+UseSerialGC -Xms256m -Xmx384m -Xss512k
                volumes:
                  - ./storage:/app/storage
                mem_limit: 512m
            EOF

            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
